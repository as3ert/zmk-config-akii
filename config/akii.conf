# The custom two-tier kscan driver (drivers/kscan/) owns both MCP23017s over
# raw I2C, so we only need the I2C bus -- not the mcp230xx gpio driver nor the
# stock matrix kscan. CONFIG_ZMK_KSCAN_AKII_TWOTIER auto-enables from the DT
# node (see top-level Kconfig).
CONFIG_I2C=y

# ZMK Studio stays unlocked by default -- no need to press a studio_unlock
# key before editing. Trade-off: anyone with USB access can remap the board.
CONFIG_ZMK_STUDIO_LOCKING=n

# Deep sleep stays OFF: without INT lines a keypress cannot wake the MCU.
# Revisit after the INT bodge wire is added.
# CONFIG_ZMK_SLEEP=y

# NOTE on QSPI flash power: do NOT disable the QSPI NOR driver. Measured on this
# board: driver ON = 0.57mA idle, driver OFF = 1.15mA idle. The driver is what
# puts the P25Q16H into low power; removing it leaves the flash awake (worse).
# Deeper DPD via PM_DEVICE_RUNTIME risks the known Zephyr #55543 DPD-exit bug
# on this chip (flash-write/settings failures), so we leave the flash to the
# stock driver and accept ~0.57mA as the practical floor.
