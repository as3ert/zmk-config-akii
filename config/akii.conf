# The custom two-tier kscan driver (drivers/kscan/) owns both MCP23017s over
# raw I2C, so we only need the I2C bus -- not the mcp230xx gpio driver nor the
# stock matrix kscan. CONFIG_ZMK_KSCAN_AKII_TWOTIER auto-enables from the DT
# node (see top-level Kconfig).
CONFIG_I2C=y

# ZMK Studio stays unlocked by default -- no need to press a studio_unlock
# key before editing. Trade-off: anyone with USB access can remap the board.
CONFIG_ZMK_STUDIO_LOCKING=n

# Deep sleep stays OFF: without INT lines a keypress cannot wake the MCU.
# Revisit after the INT bodge wire is added.
# CONFIG_ZMK_SLEEP=y

# QSPI flash power: keep the NOR driver ON (driver OFF measured WORSE -- 1.15mA
# vs 0.57mA -- because the driver is what powers the flash down). At 0.57mA the
# P25Q16H sits in STANDBY (~18uA), not deep-power-down. Runtime PM makes the
# driver auto-enter DPD after each op via its acquire/release refcount, clawing
# back ~17uA (0.57 -> ~0.55mA; near meter noise, so "correct" more than visible).
# Safe: ZMK settings (BLE bonds + Studio keymaps) are NVS on the INTERNAL flash0,
# untouched by the external QSPI; the #55543 DPD-exit bug is fixed (Zephyr PR
# #64782, in our v4.1.0) and the v4.1.0 xiao_ble pinctrl already holds CSN high
# in sleep (no CS-float regression).
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y
