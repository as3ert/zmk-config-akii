# The custom two-tier kscan driver (drivers/kscan/) owns both MCP23017s over
# raw I2C, so we only need the I2C bus -- not the mcp230xx gpio driver nor the
# stock matrix kscan. CONFIG_ZMK_KSCAN_AKII_TWOTIER auto-enables from the DT
# node (see top-level Kconfig).
CONFIG_I2C=y

# ZMK Studio stays unlocked by default -- no need to press a studio_unlock
# key before editing. Trade-off: anyone with USB access can remap the board.
CONFIG_ZMK_STUDIO_LOCKING=n

# Deep sleep stays OFF: without INT lines a keypress cannot wake the MCU.
# Revisit after the INT bodge wire is added.
# CONFIG_ZMK_SLEEP=y

# QSPI flash power -- DEAD END, do not pursue. Two things were measured on this
# board, both bad:
#   1. CONFIG_NORDIC_QSPI_NOR=n (driver off)  -> 1.15mA (flash left awake).
#   2. CONFIG_PM_DEVICE_RUNTIME=y (to DPD the flash) -> 3.31mA AND keys stopped
#      working. Reason: PM_DEVICE_RUNTIME is GLOBAL; it runtime-suspends the I2C
#      bus too, which the custom two-tier kscan driver hammers without being
#      PM-aware -> scan breaks (no typing) + constant suspend/resume churn (high
#      current). The ~17uA standby->DPD headroom is not worth a PM-aware rewrite.
# Conclusion: keep the stock QSPI driver as-is. 0.57mA idle (flash in standby +
# nRF/BLE floor + 2x MCP23017) is the practical floor for this board without
# deep sleep. Leave it alone.
