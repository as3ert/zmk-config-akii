# The matrix sits behind two MCP23017 I2C expanders: neither the I2C bus
# nor the expander driver is enabled by the devicetree alone.
CONFIG_I2C=y
CONFIG_GPIO_MCP230XX=y

# Matrix lives behind I2C expanders without INT wiring -> interrupts are
# unavailable, polling is mandatory for both kscan drivers.
CONFIG_ZMK_KSCAN_MATRIX_POLLING=y
CONFIG_ZMK_KSCAN_DIRECT_POLLING=y

# EC11 rotary encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Deep sleep stays OFF: without INT lines a keypress cannot wake the MCU.
# Revisit after the INT bodge wire is added.
# CONFIG_ZMK_SLEEP=y
